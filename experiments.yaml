# Solafune experiment queue — run with: python run_all.py
# Each entry maps to one train.py call. Missing keys use the defaults below.
# Run order is top-to-bottom sequential (one GPU).

defaults:
  data_dir: ~/solafune/data
  csv_train: ~/solafune/data/train_dataset.csv
  epochs: 60
  batch_size: 32
  num_workers: 4
  input_size: 128
  lr: 1.0e-4
  ema_decay: 0.999
  scheduler_patience: 5
  early_stop_patience: 20
  val_mode: holdout
  holdout_locations: "florida,jakarta,cape_town,friuli_venezia_giulia"
  encoder: efficientnet-b4
  band_mode: 12slot+diff
  loss_type: dual_head
  stats_max_samples: 2000

experiments:
  # v15: dual-head CB+BCE loss + 12slot+diff (temporal cooling rate)
  # Direct attack on heavy rain tail; see next.md for full rationale
  - run_name: v15_dual_head_cb
