# Solafune experiment queue — run with: python run_all.py
# Each entry maps to one train.py call. Missing keys use the defaults below.
# Run order is top-to-bottom sequential (one GPU).

defaults:
  data_dir: ~/solafune/data
  csv_train: ~/solafune/data/train_dataset.csv
  epochs: 40
  batch_size: 32
  num_workers: 4
  input_size: 96
  lr: 1.0e-4
  ema_decay: 0.999
  scheduler_patience: 5
  early_stop_patience: 15
  val_mode: holdout
  holdout_locations: "florida,jakarta,cape_town,friuli_venezia_giulia"
  encoder: efficientnet-b4
  band_mode: 12slot

experiments:
  # v14a: 48x48 input + center crop (bottleneck 2x2)
  # Test whether removing F.interpolate fixes val_RMSE_rain stuck at 2.2~2.4
  - run_name: v14_48px_crop
    input_size: 48

  # v14b: 96x96 input + center crop (bottleneck 3x3) — recommended
  # More spatial context than 48x48, still no interpolation artifact
  - run_name: v14_96px_crop
    input_size: 96
